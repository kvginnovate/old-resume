<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chokkar Gurusamy — Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header {
      width: 100%;
      padding: 14px 20px;
      background: #16213e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header h1 {
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 500;
    }
    .header a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 13px;
      padding: 8px 14px;
      border: 1px solid #4fc3f7;
      border-radius: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .header a:hover { background: #4fc3f7; color: #1a1a2e; }
    .pdf-pages {
      width: 100%;
      max-width: 860px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .pdf-pages canvas {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .loading {
      color: #888;
      padding: 60px 0;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .header h1 { font-size: 14px; }
      .pdf-pages { padding: 8px; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chokkar Gurusamy — Staff Engineer</h1>
    <a href="main_v3.pdf" download>⬇ Download</a>
  </div>
  <div class="pdf-pages" id="container">
    <div class="loading">Loading resume…</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function renderPDF() {
      const container = document.getElementById('container');
      try {
        const pdf = await pdfjsLib.getDocument('main_v3.pdf').promise;
        container.innerHTML = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const scale = Math.min(window.innerWidth / page.getViewport({scale:1}).width, 2);
          const viewport = page.getViewport({scale});
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          container.appendChild(canvas);
          await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        }
      } catch(e) {
        container.innerHTML = '<div class="loading">Failed to load PDF. <a href="main_v3.pdf" style="color:#4fc3f7">Download instead</a></div>';
      }
    }
    renderPDF();
  </script>
</body>
</html>
